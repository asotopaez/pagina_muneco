# nginx.conf — Cerrajería San Rafael
# Compatible con Google Cloud Run (puerto dinámico via $PORT)

server {
    # Cloud Run inyecta la variable de entorno PORT (default 8080)
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Charset
    charset utf-8;

    # Seguridad — headers básicos
    add_header X-Frame-Options "SAMEORIGIN"        always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-XSS-Protection "1; mode=block"    always;
    add_header Referrer-Policy "strict-origin"     always;

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Ruta principal — single-page app
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache larga para assets estáticos (CSS, JS, SVG, imágenes)
    location ~* \.(css|js|svg|ico|png|jpg|jpeg|gif|webp|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Sin cache para el HTML (siempre sirve la versión más reciente)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Deshabilitar logs de favicon para reducir ruido
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # Ocultar versión de nginx
    server_tokens off;
}
